default: &default
  adapter: postgresql
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  username: <%= ENV.fetch("USER", "postgres") %>
  database: "aic-dev"

test:
  <<: *default
  username: <%= ENV.fetch("USER", "postgres") %>
  host: <%= ENV.fetch("DB_HOST", nil) %>
  password: <%= ENV.fetch("DB_PASSWORD", nil) %>
  database: "aic-test"

production:
  <<: *default
