name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-ruby:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15.6
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: aic-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DB_HOST: 127.0.0.1
      DB_USER: postgres
      DB_PASSWORD: password

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.6
          bundler-cache: true

      - name: Install JS dependencies
        run: yarn install --immutable

      - name: Install esbuild
        run: yarn add --dev esbuild

      - name: Build assets
        run: |
          yarn build
          yarn build:css

      - name: Load schema
        run: bin/rails db:schema:load --trace

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run RSpec
        run: bundle exec rspec

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: tmp/screenshots

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ruby-coverage
          path: coverage

  test-javascript:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run Jest
        run: yarn test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: js-coverage
          path: coverage

  standardrb:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.6
          bundler-cache: true

      - name: Run StandardRB
        run: bundle exec standardrb
